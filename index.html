<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carta para Mamá</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="card">
    <h1>Te amo, Mamá 💖</h1>
    <p>
      Gracias por tu amor incondicional, por estar siempre a mi lado y por ser mi inspiración diaria.
    </p>
    <button id="openLetter">Abrir Carta</button>
  </div>
  <div class="letter hidden">
    <p>Querida Mamá,</p>
    <p>
      Eres la luz que guía mi camino y el abrazo que reconforta mi alma. Te amo con todo mi corazón.
    </p>
    <p>Con amor,</p>
    <p>Tu [hijo/hija]</p>
    <button id="closeLetter">Cerrar</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
